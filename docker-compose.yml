services:
  api:
    build: .
    container_name: icu.xiaosong.blog.service.api
    env_file: ./compose/.local.env
    depends_on: [db, redis]
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
  db:
    image: postgres:16
    container_name: icu.xiaosong.blog.service.db
    env_file: ./compose/.local.env
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
  redis:
    image: redis:8
    container_name: icu.xiaosong.blog.service.redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
volumes:
  pg_data:
  redis_data:
